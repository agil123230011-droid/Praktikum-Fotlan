input_polygons:
  datasets:
    - ./vektor_praktikum/vektor_jalan.sqlite
      uniqueid: id
      lifting: Road
      # Road biasanya tidak butuh height_field jika diangkat berdasarkan titik LiDAR
    - ./vektor_praktikum/vektor_bangunan.sqlite
      uniqueid: orig_oid
      lifting: Building

lifting_options:
  Building:
    lod: 1
    floor: true
    inner_walls: true
    triangulate: false
    ground:
      # Menggunakan persentil rendah untuk menentukan dasar bangunan
      height: percentile-10
      use_LAS_classes:
        - 2  # Ground
    roof:
      # Menggunakan persentil tinggi untuk atap (LOD1 flat roof)
      height: percentile-90
      use_LAS_classes:
        - 6  # Building
  Road:
    # Jalan diangkat rata dengan tanah di sekitarnya
    height: percentile-50
    use_LAS_classes:
      - 2    # Ground

input_elevation:
  datasets:
    - ./lidar/lidar_sebatik.las
  # Pastikan kelas 2 dan 6 tidak di-omit agar bisa digunakan di atas
  omit_LAS_classes:
    - 0  # Never classified
    - 1  # Unclassified
    - 7  # Noise (disarankan ditambah)
    - 18 # High Noise (disarankan ditambah)
  thinning: 0

options:
  building_radius_vertex_elevation: 3.0
  radius_vertex_elevation: 1.0
  threshold_jump_edges: 0.5
